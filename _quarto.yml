project:
  type: website
  output-dir: docs

website:
  title: "My Site"
  description: "Notes, animations, and math"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - href: notes.qmd
        text: Notes
      - href: about.qmd
        text: About
      - href: manim-external.qmd
        text: Manim External
  page-footer:
    center: "Built with [Quarto](https://quarto.org)"

format:
  html:
    theme: cosmo          # try: flatly, darkly, slate, solar, litera
    css: styles.css
    toc: true
    toc-depth: 3
    grid:
      body-width: 900px
      margin-width: 200px
    number-sections: false
    smooth-scroll: true
    highlight-style: github

# LaTeX math — rendered via KaTeX (fast, no config needed)
# Use $...$ for inline,  $$...$$  for display blocks
